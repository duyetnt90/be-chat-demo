version: "3.9"

services:
  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: chat-node
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - chat-network

  nginx:
    image: nginx:latest
    container_name: chat-nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - node
    networks:
      - chat-network

  db:
    image: mongo:6
    container_name: chat-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./docker/db:/docker-entrypoint-initdb.d
    networks:
      - chat-network

  redis:
    image: redis:7
    container_name: chat-redis
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - chat-network

volumes:
  mongo-data:

networks:
  chat-network: